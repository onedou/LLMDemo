<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{BOT_NAME}} - 智能对话助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                         "Microsoft YaHei", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #e6ecf5 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 聊天窗口容器 */
        .chat-container {
            width: 100%;
            max-width: 560px;
            height: 90vh;
            max-height: 760px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(60, 80, 120, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0 12px;
        }

        /* 顶部标题栏 */
        .chat-header {
            padding: 18px 24px;
            background: linear-gradient(135deg, #4a90e2 0%, #5b7fe8 100%);
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .chat-header .title {
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header .subtitle {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 2px;
        }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f7f9fc;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        .message-row .bubble-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
        }

        .message-row.bot .bubble-avatar {
            background: #dce8fa;
        }

        .message-row.user .bubble-avatar {
            background: #d5e9dd;
        }

        /* 聊天气泡 */
        .bubble {
            max-width: 72%;
            padding: 10px 14px;
            font-size: 15px;
            line-height: 1.55;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message-row.bot .bubble {
            background: #ffffff;
            color: #333333;
            border-radius: 14px 14px 14px 4px;
            box-shadow: 0 2px 8px rgba(60, 80, 120, 0.08);
        }

        .message-row.user .bubble {
            background: linear-gradient(135deg, #4a90e2 0%, #5b7fe8 100%);
            color: #ffffff;
            border-radius: 14px 14px 4px 14px;
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.25);
        }

        /* "思考中"气泡 */
        .bubble.thinking {
            color: #8a97a8;
            font-style: italic;
        }

        /* 底部输入区 */
        .chat-input-area {
            padding: 14px 16px;
            background: #ffffff;
            border-top: 1px solid #edf0f5;
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 11px 16px;
            font-size: 15px;
            border: 1px solid #dde3ec;
            border-radius: 22px;
            outline: none;
            background: #f7f9fc;
            transition: border-color 0.2s, background 0.2s;
        }

        #message-input:focus {
            border-color: #4a90e2;
            background: #ffffff;
        }

        #send-btn {
            padding: 0 22px;
            font-size: 15px;
            color: #ffffff;
            background: linear-gradient(135deg, #4a90e2 0%, #5b7fe8 100%);
            border: none;
            border-radius: 22px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        #send-btn:hover:not(:disabled) {
            opacity: 0.9;
        }

        #send-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 顶部标题栏 -->
        <div class="chat-header">
            <div class="avatar">🤖</div>
            <div>
                <div class="title">{{BOT_NAME}}</div>
                <div class="subtitle">迷你Transformer对话演示</div>
            </div>
        </div>

        <!-- 消息区域 -->
        <div class="chat-messages" id="chat-messages">
            <div class="message-row bot">
                <div class="bubble-avatar">🤖</div>
                <div class="bubble">你好！我是{{BOT_NAME}}，很高兴认识你～有什么想聊的吗？</div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="输入消息，回车发送..."
                   autocomplete="off" autofocus>
            <button id="send-btn">发送</button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('chat-messages');
        const inputEl = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const BOT_NAME = '{{BOT_NAME}}';

        // 添加一条消息气泡，返回气泡元素以便后续更新内容
        function addMessage(role, text, thinking = false) {
            const row = document.createElement('div');
            row.className = 'message-row ' + role;

            const avatar = document.createElement('div');
            avatar.className = 'bubble-avatar';
            avatar.textContent = role === 'user' ? '🙂' : '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'bubble' + (thinking ? ' thinking' : '');
            bubble.textContent = text;

            row.appendChild(avatar);
            row.appendChild(bubble);
            messagesEl.appendChild(row);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return bubble;
        }

        // 发送消息并等待回复
        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            // 显示用户消息，清空输入框
            addMessage('user', message);
            inputEl.value = '';

            // 等待期间禁用输入，显示"思考中"提示
            inputEl.disabled = true;
            sendBtn.disabled = true;
            const bubble = addMessage('bot', BOT_NAME + ' 思考中...', true);

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await resp.json();

                bubble.classList.remove('thinking');
                if (resp.ok && data.reply) {
                    bubble.textContent = data.reply;
                } else {
                    bubble.textContent = data.error || '出错了，请稍后再试~';
                }
            } catch (err) {
                bubble.classList.remove('thinking');
                bubble.textContent = '连接服务器失败，请确认服务是否已启动~';
            } finally {
                inputEl.disabled = false;
                sendBtn.disabled = false;
                inputEl.focus();
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }
        }

        // 点击按钮或回车发送（忽略中文输入法组词中的回车）
        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.isComposing) {
                sendMessage();
            }
        });
    </script>
</body>
</html>
